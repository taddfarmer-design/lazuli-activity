<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lazuli Activity Prototype</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
            font-family: sans-serif;
      background: #f4f6f9;
            display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
}
    .activity {
            background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
}
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #1a1a2e; }
          p { color: #555; line-height: 1.6; margin-bottom: 24px; }
    .media-placeholder {
            width: 100%;
      height: 260px;
            background: #e8edf5;
              border-radius: 8px;
      display: flex;
      align-items: center;
        justify-content: center;
      color: #888;
      font-size: 0.95rem;
      border: 2px dashed #c5cfe0;
      margin-bottom: 24px;
}
            button {
                  background: #4361ee;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 1rem;
            cursor: pointer;
        }
    button:hover { background: #3451d1; }
  </style>
</head>
    <body>
  <div class="activity">
    <h1>Activity Title</h1>
    <p>This is a placeholder for your Lazuli multimedia activity. Replace this content with your actual activity components.</p>
            <div class="media-placeholder">[ Media / Content goes here ]</div>
    <button onclick="alert('Activity interaction!')">Continue</button>
  </div>
</body>
</html>
