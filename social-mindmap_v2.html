<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Connection Map</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #035271;
      --blue:   #1280b0;
      --sky:    #B1D6E3;
      --moon:   #E4F3F9;
      --dgray:  #545454;
      --mgray:  #D9D9D9;
      --lgray:  #F7F7F7;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--moon);
      color: var(--dgray);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      background: var(--navy);
      color: #fff;
      width: 100%;
      padding: 0.875rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.01em; }

    #export-btn {
      padding: 0.45rem 1rem;
      background: transparent;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }
    #export-btn:hover  { background: rgba(255,255,255,0.15); border-color: #fff; }
    #export-btn:focus-visible { outline: 3px solid var(--sky); outline-offset: 2px; }

    /* ── Add-connection toolbar ───────────────────── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.625rem;
      justify-content: center;
      padding: 0.875rem 1rem 0.5rem;
      width: 100%;
      max-width: 860px;
    }

    .add-btn {
      padding: 0.45rem 1rem;
      border: 2px solid currentColor;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      background: #fff;
      letter-spacing: 0.01em;
      transition: background 0.15s, color 0.15s;
    }
    .add-btn:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }
    .add-btn[data-section="personal"]  { color: var(--navy); }
    .add-btn[data-section="work"]      { color: var(--blue); }
    .add-btn[data-section="learning"]  { color: #0a6e8a; }
    .add-btn[data-section="personal"]:hover  { background: var(--navy); color: #fff; }
    .add-btn[data-section="work"]:hover      { background: var(--blue); color: #fff; }
    .add-btn[data-section="learning"]:hover  { background: #0a6e8a; color: #fff; }

    /* ── View toggle pill ────────────────────────── */
    .view-toggle {
      display: flex;
      background: #fff;
      border: 2px solid var(--mgray);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
      margin: 0.25rem auto 0.5rem;
    }
    .toggle-btn {
      padding: 0.35rem 1.1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      background: transparent;
      color: var(--dgray);
      transition: background 0.18s, color 0.18s;
    }
    .toggle-btn.active {
      background: var(--navy);
      color: #fff;
    }
    .toggle-btn:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }

    .full-hint {
      font-size: 0.75rem;
      color: var(--blue);
      text-align: center;
      min-height: 1.2em;
      padding: 0.1rem 1rem 0.25rem;
      font-style: italic;
    }

    /* ── Map container ────────────────────────────── */
    .map-wrap {
      width: 100%;
      max-width: 800px;
      padding: 0 0.5rem 1.5rem;
    }
    #map-svg { width: 100%; height: auto; display: block; }

    /* ── Legend ───────────────────────────────────── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      justify-content: center;
      padding: 0 1rem 1.25rem;
      font-size: 0.78rem;
      color: var(--dgray);
    }
    .legend-item { display: flex; align-items: center; gap: 0.375rem; }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Modal overlay ────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(3, 82, 113, 0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 1.75rem 1.75rem 1.5rem;
      width: 92%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(3,82,113,0.22);
    }
    .modal h2 {
      font-size: 1.05rem;
      color: var(--navy);
      margin-bottom: 1.25rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--dgray);
      margin-bottom: 0.35rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border: 2px solid var(--mgray);
      border-radius: 7px;
      font-size: 0.95rem;
      color: var(--dgray);
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-group input:focus { outline: none; border-color: var(--blue); }
    .form-group input.invalid { border-color: #c0392b; }

    .field-hint {
      font-size: 0.72rem;
      color: #999;
      margin-top: 0.25rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }
    .btn-secondary {
      padding: 0.45rem 1rem;
      border: 2px solid var(--mgray);
      border-radius: 7px;
      background: #fff;
      color: var(--dgray);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-secondary:hover { border-color: #aaa; }
    .btn-secondary:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }

    .btn-primary {
      padding: 0.45rem 1.1rem;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--navy); }
    .btn-primary:focus-visible { outline: 3px solid var(--navy); outline-offset: 2px; }

    /* ── Screen-reader only ──────────────────────── */
    .sr-only {
      position: absolute; width:1px; height:1px;
      overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap;
    }

    /* ── SVG node hover / drag ────────────────────── */
    .conn-node { cursor: grab; }
    .conn-node:active { cursor: grabbing; }
    .conn-node:focus { outline: none; }
    .conn-node:focus .node-circle,
    .conn-node:hover .node-circle {
      filter: drop-shadow(0 0 6px rgba(18,128,176,0.55));
    }
    /* Delete button on nodes */
    .node-delete { cursor: pointer; opacity: 0; transition: opacity 0.15s; }
    .conn-node:hover .node-delete,
    .conn-node:focus .node-delete,
    .node-delete:focus-within,
    .node-delete:focus { opacity: 1; }
    .node-delete { cursor: pointer !important; }
    /* Connect button (full-network mode) */
    .connect-btn { cursor: pointer; opacity: 0; transition: opacity 0.15s; }
    .conn-node:hover .connect-btn,
    .conn-node:focus .connect-btn,
    .connect-btn:focus-within,
    .connect-btn:focus { opacity: 1; }
    .connect-btn { cursor: pointer !important; }
    /* Focus ring on SVG interactive elements */
    [role="button"]:focus-visible { outline: 3px solid #1280b0; outline-offset: 3px; border-radius: 50%; }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────── -->
<header>
  <h1>Social Connection Map</h1>
  <button id="export-btn" aria-label="Download map as PNG image">&#8595; Download PNG</button>
</header>

<!-- ── LIVE REGION ─────────────────────────────────── -->
<div aria-live="polite" aria-atomic="true" class="sr-only" id="live-announce"></div>

<!-- ── ADD BUTTONS ─────────────────────────────────── -->
<div class="toolbar" role="toolbar" aria-label="Add connections to your map">
  <button class="add-btn" data-section="personal"  aria-label="Add a personal connection">+ Personal</button>
  <button class="add-btn" data-section="work"       aria-label="Add a work or community connection">+ Work / Community</button>
  <button class="add-btn" data-section="learning"   aria-label="Add a learning connection">+ Learning</button>
</div>

<!-- ── LEGEND ──────────────────────────────────────── -->
<div class="legend" aria-label="Map legend">
  <div class="legend-item">
    <svg width="52" height="16" aria-hidden="true">
      <line x1="0" y1="8" x2="52" y2="8" stroke="#035271" stroke-width="2.5"/>
      <circle cx="26" cy="8" r="5.5" fill="#035271"/>
    </svg>
    <span>Personal</span>
  </div>
  <div class="legend-item">
    <svg width="52" height="16" aria-hidden="true">
      <line x1="0" y1="8" x2="52" y2="8" stroke="#1280b0" stroke-width="2.5" stroke-dasharray="8 4"/>
      <rect x="21" y="3" width="10" height="10" fill="#1280b0"/>
    </svg>
    <span>Work / Community</span>
  </div>
  <div class="legend-item">
    <svg width="52" height="16" aria-hidden="true">
      <line x1="0" y1="8" x2="52" y2="8" stroke="#0a6e8a" stroke-width="2.5" stroke-dasharray="3 4"/>
      <polygon points="26,1 32,8 26,15 20,8" fill="#0a6e8a"/>
    </svg>
    <span>Learning</span>
  </div>
  <div class="legend-item" style="color:#999; font-style: italic;">
    <span>Drag nodes to reposition &nbsp;·&nbsp; Hover or focus a node to remove &nbsp;·&nbsp; Use arrow keys to nudge</span>
  </div>
</div>

<!-- ── MAP ─────────────────────────────────────────── -->
<main class="map-wrap">
  <svg id="map-svg" viewBox="0 0 800 800"
       xmlns="http://www.w3.org/2000/svg"
       role="img"
       aria-labelledby="map-title map-desc">
    <title id="map-title">Social Connection Map</title>
    <desc  id="map-desc">An interactive mind-map showing personal, work/community, and learning connections radiating from a central node.</desc>

    <!-- Background -->
    <rect width="800" height="800" fill="#F7F7F7"/>

    <!-- Connections (lines) -->
    <g id="g-lines"></g>

    <!-- Extended network ghost layer -->
    <g id="g-ghosts"></g>

    <!-- Nodes -->
    <g id="g-nodes"></g>

    <!-- Center node (rendered last so it's on top) -->
    <g id="center-node" role="button" tabindex="0"
       aria-label="Center node — your name. Press Enter to edit.">
      <circle id="center-circle" cx="400" cy="400" r="52"
              fill="#035271" stroke="#fff" stroke-width="4"
              style="cursor:pointer; filter:drop-shadow(0 3px 8px rgba(3,82,113,0.35))"/>
      <text id="center-line1" x="400" y="397"
            text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
            font-size="14" font-weight="700" fill="#fff" pointer-events="none">You</text>
      <text x="400" y="413"
            text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
            font-size="9" fill="rgba(255,255,255,0.65)" pointer-events="none">tap to edit</text>
    </g>
  </svg>
</main>

<!-- ── VIEW TOGGLE ─────────────────────────────────── -->
<div class="view-toggle" role="group" aria-label="Map view">
  <button class="toggle-btn active" id="btn-my-network"   aria-pressed="true">My Network</button>
  <button class="toggle-btn"        id="btn-full-network" aria-pressed="false">Full Network</button>
</div>

<!-- ── FULL NETWORK HINT ───────────────────────────── -->
<p id="full-network-hint" class="full-hint" aria-live="polite"></p>


<!-- ── ADD CONNECTION MODAL ────────────────────────── -->
<div class="overlay" id="add-modal" role="dialog" aria-modal="true" aria-labelledby="add-modal-title">
  <div class="modal">
    <h2 id="add-modal-title">Add Connection</h2>
    <div class="form-group">
      <label for="input-name">Name <span aria-hidden="true">*</span></label>
      <input type="text" id="input-name" autocomplete="off" placeholder="e.g. Alex" required />
      <p class="field-hint" id="name-hint" aria-live="polite"></p>
    </div>
    <div class="form-group">
      <label for="input-role">Relationship type <span style="font-weight:400;color:#999">(optional)</span></label>
      <input type="text" id="input-role" autocomplete="off"
             placeholder="e.g. Friend, Mentor, Colleague…"
             list="role-datalist" />
      <datalist id="role-datalist"></datalist>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="add-cancel">Cancel</button>
      <button class="btn-primary"   id="add-confirm">Add to Map</button>
    </div>
  </div>
</div>

<!-- ── CONNECTION LABEL MODAL ─────────────────────── -->
<div class="overlay" id="label-modal" role="dialog" aria-modal="true" aria-labelledby="label-modal-title">
  <div class="modal">
    <h2 id="label-modal-title">Name this connection</h2>
    <div class="form-group">
      <label for="input-label">Relationship type <span style="font-weight:400;color:#999">(optional)</span></label>
      <input type="text" id="input-label" autocomplete="off"
             placeholder="e.g. Friend, Colleague, Mentor…"
             list="label-datalist" />
      <datalist id="label-datalist">
        <option value="Friend">
        <option value="Family">
        <option value="Neighbor">
        <option value="Colleague">
        <option value="Manager">
        <option value="Instructor">
        <option value="Mentor">
      </datalist>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="label-skip">Skip</button>
      <button class="btn-primary"   id="label-save">Save</button>
    </div>
  </div>
</div>

<!-- ── EDIT NAME MODAL ─────────────────────────────── -->
<div class="overlay" id="name-modal" role="dialog" aria-modal="true" aria-labelledby="name-modal-title">
  <div class="modal">
    <h2 id="name-modal-title">Your Name</h2>
    <div class="form-group">
      <label for="input-center">Your name (shown in center)</label>
      <input type="text" id="input-center" autocomplete="off" placeholder="Your name" />
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="name-cancel">Cancel</button>
      <button class="btn-primary"   id="name-save">Save</button>
    </div>
  </div>
</div>


<script>
/* ─────────────────────────────────────────────────
   Constants & config
───────────────────────────────────────────────── */
const CX = 400, CY = 400;
const R_CENTER  = 52;
const TO_RAD    = Math.PI / 180;

const SECTIONS = {
  personal: {
    start: -90, end: 30,
    nodeColor: '#035271',
    lineDash:  '',               // solid
    label:     'Personal',
    suggestions: ['Friend','Family','Neighbor','Colleague','Manager','Instructor','Mentor']
  },
  work: {
    start: 30, end: 150,
    nodeColor: '#1280b0',
    lineDash:  '10 6',           // dashed
    label:     'Work / Community',
    suggestions: ['Friend','Family','Neighbor','Colleague','Manager','Instructor','Mentor']
  },
  learning: {
    start: 150, end: 270,
    nodeColor: '#0a6e8a',
    lineDash:  '3 5',            // dotted
    label:     'Learning',
    suggestions: ['Friend','Family','Neighbor','Colleague','Manager','Instructor','Mentor']
  }
};

const state = {
  nodes: { personal: [], work: [], learning: [] },
  connections: [],          // [{fromSection, fromIndex, toSection, toIndex, label}]
  connectingFrom: null,     // {section, index} | null — node awaiting second click
  pendingConnection: null,  // connection waiting for label modal
  centerName: 'You',
  viewMode: 'my',
  pendingSection: null,
  lastFocusedBtn: null
};


/* ─────────────────────────────────────────────────
   Utility helpers
───────────────────────────────────────────────── */
function polar(angleDeg, r) {
  const a = angleDeg * TO_RAD;
  return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) };
}

// Polar coords relative to an arbitrary origin point
function polarFrom(ox, oy, angleDeg, r) {
  const a = angleDeg * TO_RAD;
  return { x: ox + r * Math.cos(a), y: oy + r * Math.sin(a) };
}


function truncate(str, max) {
  return str.length > max ? str.slice(0, max - 1) + '\u2026' : str;
}

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

function announce(msg) {
  const el = document.getElementById('live-announce');
  el.textContent = '';
  requestAnimationFrame(() => { el.textContent = msg; });
}


/* ─────────────────────────────────────────────────
   Layout: position nodes in a sector (or use custom drag position)
───────────────────────────────────────────────── */
function nodePosition(sectionKey, index) {
  const node = state.nodes[sectionKey][index];
  // Use dragged position if set
  if (node && node.x !== undefined && node.y !== undefined) {
    return { x: node.x, y: node.y };
  }
  const sec   = SECTIONS[sectionKey];
  const total = state.nodes[sectionKey].length;
  const arcSpread = (sec.end - sec.start) * 0.72;
  const midAngle  = (sec.start + sec.end) / 2;

  const COLS    = 3;
  const row     = Math.floor(index / COLS);
  const col     = index % COLS;
  const rowSize = Math.min(COLS, total - row * COLS);

  const step      = rowSize > 1 ? arcSpread / (rowSize - 1) : 0;
  const rowStart  = midAngle - (arcSpread / 2);
  const angle     = rowSize > 1 ? rowStart + col * step : midAngle;

  const radii = [155, 240, 320];
  const radius = radii[Math.min(row, radii.length - 1)];
  return polar(angle, radius);
}


/* ─────────────────────────────────────────────────
   Curved path helper — quadratic bezier from center to node.
   Each line arcs gently so lines can never be mistaken
   for node-to-node connections.
───────────────────────────────────────────────── */
function connectionPath(x2, y2) {
  return connectionPathAndMid(x2, y2).d;
}

// Returns both the SVG path string and the visual midpoint of the bezier curve
function connectionPathAndMid(x2, y2) {
  const dx = x2 - CX, dy = y2 - CY;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 1) return { d: `M ${CX} ${CY} L ${x2} ${y2}`, mx: (CX+x2)/2, my: (CY+y2)/2 };
  const curve = len * 0.22;
  const cpx = (CX + x2) / 2 - (dy / len) * curve;
  const cpy = (CY + y2) / 2 + (dx / len) * curve;
  // Point at t=0.5 on quadratic bezier: 0.25*P0 + 0.5*CP + 0.25*P1
  const mx = 0.25 * CX  + 0.5 * cpx + 0.25 * x2;
  const my = 0.25 * CY  + 0.5 * cpy + 0.25 * y2;
  return { d: `M ${CX} ${CY} Q ${cpx} ${cpy} ${x2} ${y2}`, mx, my };
}


/* ─────────────────────────────────────────────────
   Render
───────────────────────────────────────────────── */
function renderMap() {
  // Connection lines — one curved path per node, always from center
  const gLines = document.getElementById('g-lines');
  gLines.innerHTML = '';
  Object.entries(state.nodes).forEach(([key, list]) => {
    const sec = SECTIONS[key];
    list.forEach((node, i) => {
      const pos = nodePosition(key, i);
      const { d, mx, my } = connectionPathAndMid(pos.x, pos.y);
      const attrs = {
        d,
        stroke: sec.nodeColor, 'stroke-width': '2.5',
        fill: 'none',
        id: `line-${key}-${i}`
      };
      if (sec.lineDash) attrs['stroke-dasharray'] = sec.lineDash;
      gLines.appendChild(svgEl('path', attrs));

      // Shape marker at bezier midpoint — circle / square / diamond
      const mc = sec.nodeColor;
      const np = { 'pointer-events': 'none' };
      if (key === 'personal') {
        gLines.appendChild(svgEl('circle', { cx: mx, cy: my, r: '5.5', fill: mc, ...np }));
      } else if (key === 'work') {
        gLines.appendChild(svgEl('rect', { x: mx - 5, y: my - 5, width: '10', height: '10', fill: mc, ...np }));
      } else {
        gLines.appendChild(svgEl('polygon', {
          points: `${mx},${my - 7} ${mx + 6},${my} ${mx},${my + 7} ${mx - 6},${my}`,
          fill: mc, ...np
        }));
      }
    });
  });

  // ── Full-network layer ───────────────────────────
  const gGhosts = document.getElementById('g-ghosts');
  gGhosts.innerHTML = '';

  if (state.viewMode === 'full') {
    // Collect all placed node positions
    const allPlaced = [];
    Object.entries(state.nodes).forEach(([key, list]) => {
      list.forEach((node, i) => {
        allPlaced.push({ pos: nodePosition(key, i), key, index: i });
      });
    });

    // ── User-defined connections between nodes ──────
    state.connections.forEach((conn, ci) => {
      const fromNode = state.nodes[conn.fromSection]?.[conn.fromIndex];
      const toNode   = state.nodes[conn.toSection]?.[conn.toIndex];
      if (!fromNode || !toNode) return;

      const fp = nodePosition(conn.fromSection, conn.fromIndex);
      const tp = nodePosition(conn.toSection,   conn.toIndex);
      const mx = (fp.x + tp.x) / 2, my = (fp.y + tp.y) / 2;

      // Connection line — curved arc between the two nodes
      const cdx = tp.x - fp.x, cdy = tp.y - fp.y;
      const clen = Math.sqrt(cdx*cdx + cdy*cdy) || 1;
      const cCurve = clen * 0.28;
      const cpx = (fp.x + tp.x) / 2 - (cdy / clen) * cCurve;
      const cpy = (fp.y + tp.y) / 2 + (cdx / clen) * cCurve;
      const connPath = `M ${fp.x} ${fp.y} Q ${cpx} ${cpy} ${tp.x} ${tp.y}`;
      const connLine = svgEl('path', {
        d: connPath,
        stroke: '#545454', 'stroke-width': '2',
        'stroke-opacity': '0.45', fill: 'none'
      });
      gGhosts.appendChild(connLine);

      // Label pill or × badge at midpoint
      const removeConn = () => { state.connections.splice(ci, 1); saveState(); renderMap(); };
      const mkL = (x1,y1,x2,y2) => svgEl('line',{x1,y1,x2,y2,stroke:'#fff','stroke-width':'1.5','stroke-linecap':'round'});

      const connAriaLabel = `Remove connection between ${fromNode.name} and ${toNode.name}`;
      if (conn.label) {
        const pad = 10, xBtnW = 18;
        const textW = Math.min(conn.label.length * 6.5, 90);
        const pillW = textW + pad * 2 + xBtnW;
        const pillH = 20, pillR = 10;
        const px = mx - pillW / 2, py = my - pillH / 2;

        const pillG = svgEl('g', { style: 'cursor:default' });
        pillG.appendChild(svgEl('rect', { x: px, y: py, width: pillW, height: pillH, rx: pillR, fill: '#545454', opacity: '0.82' }));

        const lt = svgEl('text', { x: px + pad, y: my + 4.5, 'font-family': 'Arial,Helvetica,sans-serif', 'font-size': '10', fill: '#fff', 'pointer-events': 'none' });
        lt.textContent = truncate(conn.label, 14);
        pillG.appendChild(lt);

        // × on right side of pill
        const xCX = px + pillW - xBtnW / 2, xCY = my;
        pillG.appendChild(svgEl('circle', { cx: xCX, cy: xCY, r: '8', fill: 'rgba(255,255,255,0.15)', style: 'cursor:pointer' }));
        pillG.appendChild(mkL(xCX-3, xCY-3, xCX+3, xCY+3));
        pillG.appendChild(mkL(xCX+3, xCY-3, xCX-3, xCY+3));

        const hitX = svgEl('circle', { cx: xCX, cy: xCY, r: '10', fill: 'transparent',
          role: 'button', tabindex: '0', style: 'cursor:pointer',
          'aria-label': connAriaLabel });
        hitX.addEventListener('click', removeConn);
        hitX.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); removeConn(); }
        });
        pillG.appendChild(hitX);
        gGhosts.appendChild(pillG);
      } else {
        // No label — just × badge
        const badgeG = svgEl('g', {
          role: 'button', tabindex: '0',
          'aria-label': connAriaLabel,
          style: 'cursor:pointer'
        });
        badgeG.appendChild(svgEl('circle', { cx: mx, cy: my, r: '9', fill: '#545454', opacity: '0.7' }));
        badgeG.appendChild(mkL(mx-4,my-4,mx+4,my+4));
        badgeG.appendChild(mkL(mx+4,my-4,mx-4,my+4));
        badgeG.addEventListener('click', removeConn);
        badgeG.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); removeConn(); }
        });
        gGhosts.appendChild(badgeG);
      }

      // Wide invisible hit-area along the curved path
      const hitLine = svgEl('path', { d: connPath, stroke: 'transparent', 'stroke-width': '12', fill: 'none', style: 'cursor:pointer' });
      hitLine.addEventListener('click', removeConn);
      gGhosts.appendChild(hitLine);
    });

    // ── Ghost nodes (extended network suggestion) ───
    allPlaced.forEach(({ pos: { x, y } }) => {
      const outAngle = Math.atan2(y - CY, x - CX) * (180 / Math.PI);
      [-45, 0, 45].forEach(offset => {
        const gp = polarFrom(x, y, outAngle + offset, 68);
        gGhosts.appendChild(svgEl('line', {
          x1: x, y1: y, x2: gp.x, y2: gp.y,
          stroke: '#B1D6E3', 'stroke-width': '1',
          'stroke-opacity': '0.5', 'stroke-dasharray': '3 3'
        }));
        gGhosts.appendChild(svgEl('circle', {
          cx: gp.x, cy: gp.y, r: '16',
          fill: '#F7F7F7', stroke: '#B1D6E3',
          'stroke-width': '1.5', 'stroke-dasharray': '3 2', opacity: '0.75'
        }));
        gGhosts.appendChild(svgEl('circle', {
          cx: gp.x, cy: gp.y, r: '3', fill: '#B1D6E3', opacity: '0.6'
        }));
      });
    });
  }

  // Nodes
  const gNodes = document.getElementById('g-nodes');
  gNodes.innerHTML = '';
  Object.entries(state.nodes).forEach(([key, list]) => {
    const color = SECTIONS[key].nodeColor;
    list.forEach((node, i) => {
      const { x, y } = nodePosition(key, i);
      const label = node.role
        ? `${node.name}, ${node.role}, ${SECTIONS[key].label} connection`
        : `${node.name}, ${SECTIONS[key].label} connection`;

      const g = svgEl('g', {
        role: 'button',
        tabindex: '0',
        class: 'conn-node',
        'aria-label': `${label}. Press Delete or Backspace to remove.`,
        'data-section': key,
        'data-index': String(i)
      });

      // Highlight ring when this node is selected for connecting
      const isConnecting = state.connectingFrom &&
        state.connectingFrom.section === key && state.connectingFrom.index === i;
      if (isConnecting) {
        g.appendChild(svgEl('circle', {
          cx: x, cy: y, r: '48',
          fill: 'none', stroke: '#1280b0', 'stroke-width': '2.5',
          'stroke-dasharray': '6 3', opacity: '0.9'
        }));
      }

      const circleAttrs = {
        cx: x, cy: y, r: '38',
        fill: '#fff',
        stroke: color, 'stroke-width': '2.5',
        class: 'node-circle',
        style: 'filter:drop-shadow(0 2px 5px rgba(0,0,0,0.12))'
      };
      if (SECTIONS[key].lineDash) circleAttrs['stroke-dasharray'] = SECTIONS[key].lineDash;
      const circle = svgEl('circle', circleAttrs);
      g.appendChild(circle);

      const nameY = node.role ? y - 5 : y + 5;
      const tName = svgEl('text', {
        x, y: nameY,
        'text-anchor': 'middle',
        'font-family': 'Arial,Helvetica,sans-serif',
        'font-size': '13', 'font-weight': '700',
        fill: color,
        'pointer-events': 'none'
      });
      tName.textContent = truncate(node.name, 10);
      g.appendChild(tName);

      if (node.role) {
        const tRole = svgEl('text', {
          x, y: y + 12,
          'text-anchor': 'middle',
          'font-family': 'Arial,Helvetica,sans-serif',
          'font-size': '10', 'font-weight': '400',
          fill: color,
          'pointer-events': 'none'
        });
        tRole.textContent = truncate(node.role, 13);
        g.appendChild(tRole);
      }

      // × delete button (top-right of node)
      const delR = 12;
      const delX = x + 26, delY = y - 26;
      const delG = svgEl('g', { class: 'node-delete', 'aria-hidden': 'true' });

      const delCircle = svgEl('circle', {
        cx: delX, cy: delY, r: delR,
        fill: '#c0392b', stroke: '#fff', 'stroke-width': '2'
      });
      delG.appendChild(delCircle);

      const delLine1 = svgEl('line', {
        x1: delX - 5, y1: delY - 5, x2: delX + 5, y2: delY + 5,
        stroke: '#fff', 'stroke-width': '2', 'stroke-linecap': 'round'
      });
      const delLine2 = svgEl('line', {
        x1: delX + 5, y1: delY - 5, x2: delX - 5, y2: delY + 5,
        stroke: '#fff', 'stroke-width': '2', 'stroke-linecap': 'round'
      });
      delG.appendChild(delLine1);
      delG.appendChild(delLine2);

      delG.addEventListener('click', e => {
        e.stopPropagation();
        removeNode(key, i);
      });
      g.appendChild(delG);

      // Keyboard: Delete / Backspace removes the node
      g.addEventListener('keydown', e => {
        if (e.key === 'Delete' || e.key === 'Backspace') {
          e.preventDefault();
          removeNode(key, i);
        }
        // Arrow keys nudge the node
        const NUDGE = 8;
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
          e.preventDefault();
          const cur = nodePosition(key, i);
          const node = state.nodes[key][i];
          node.x = cur.x + (e.key === 'ArrowRight' ? NUDGE : e.key === 'ArrowLeft' ? -NUDGE : 0);
          node.y = cur.y + (e.key === 'ArrowDown'  ? NUDGE : e.key === 'ArrowUp'   ? -NUDGE : 0);
          renderMap();
          saveState();
          // Re-focus the moved node
          requestAnimationFrame(() => {
            const moved = document.querySelector(`[data-section="${key}"][data-index="${i}"]`);
            if (moved) moved.focus();
          });
        }
      });

      // Connect button — only in Full Network view
      if (state.viewMode === 'full') {
        const btnX = x, btnY = y + 52;
        const isSelected = state.connectingFrom?.section === key && state.connectingFrom?.index === i;
        const btnLabel   = isSelected ? `Cancel linking ${node.name}` : `Link ${node.name} to another person`;
        const btnG = svgEl('g', {
          class: 'connect-btn',
          role: 'button',
          tabindex: '0',
          'aria-label': btnLabel,
          'aria-pressed': String(isSelected)
        });
        btnG.appendChild(svgEl('circle', {
          cx: btnX, cy: btnY, r: '13',
          fill: isSelected ? '#035271' : '#1280b0',
          stroke: '#fff', 'stroke-width': '2'
        }));
        // Link icon: two dots + connecting bar
        btnG.appendChild(svgEl('circle', { cx: btnX - 5, cy: btnY, r: '2.5', fill: '#fff', 'pointer-events': 'none' }));
        btnG.appendChild(svgEl('circle', { cx: btnX + 5, cy: btnY, r: '2.5', fill: '#fff', 'pointer-events': 'none' }));
        btnG.appendChild(svgEl('line',   { x1: btnX - 2.5, y1: btnY, x2: btnX + 2.5, y2: btnY, stroke: '#fff', 'stroke-width': '2', 'pointer-events': 'none' }));
        btnG.addEventListener('click',   e => { e.stopPropagation(); handleConnectClick(key, i); });
        btnG.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); handleConnectClick(key, i); }
        });
        g.appendChild(btnG);
      }

      // Mouse / touch drag (also handles connect-click in full network mode)
      g.addEventListener('mousedown',  e => startDrag(e, key, i));
      g.addEventListener('touchstart', e => startDrag(e, key, i), { passive: false });
      g.addEventListener('click', e => {
        if (e.target.closest('.node-delete')) return;
        if (state.viewMode !== 'full') return;
        if (drag && drag.moved) return; // was a drag, not a click
        handleConnectClick(key, i);
      });

      gNodes.appendChild(g);
    });
  });
}

/* ─────────────────────────────────────────────────
   View toggle
───────────────────────────────────────────────── */
document.getElementById('btn-my-network').addEventListener('click', () => setView('my'));
document.getElementById('btn-full-network').addEventListener('click', () => setView('full'));

function setView(mode) {
  state.viewMode = mode;
  state.connectingFrom = null;
  document.getElementById('btn-my-network').classList.toggle('active', mode === 'my');
  document.getElementById('btn-my-network').setAttribute('aria-pressed', mode === 'my');
  document.getElementById('btn-full-network').classList.toggle('active', mode === 'full');
  document.getElementById('btn-full-network').setAttribute('aria-pressed', mode === 'full');
  updateHint(mode === 'full' ? 'Click or Tab to a node, then press Enter to link.' : '');
  renderMap();
}


/* ─────────────────────────────────────────────────
   Drag engine
───────────────────────────────────────────────── */
let drag = null;
let rafPending = false;

function getSVGCoords(e) {
  const svg = document.getElementById('map-svg');
  const pt  = svg.createSVGPoint();
  const src = e.touches ? e.touches[0] : e;
  pt.x = src.clientX;
  pt.y = src.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function startDrag(e, sectionKey, index) {
  if (e.target.closest('.node-delete')) return;
  if (e.target.closest('.connect-btn')) return;
  e.preventDefault();
  const pt   = getSVGCoords(e);
  const pos  = nodePosition(sectionKey, index);
  drag = { sectionKey, index, startX: pt.x, startY: pt.y, origX: pos.x, origY: pos.y, moved: false };
}

document.addEventListener('mousemove', e => {
  if (!drag) return;
  const pt   = getSVGCoords(e);
  const dx   = pt.x - drag.startX, dy = pt.y - drag.startY;
  if (Math.sqrt(dx*dx + dy*dy) > 5) drag.moved = true;
  if (!drag.moved) return;
  const node = state.nodes[drag.sectionKey][drag.index];
  node.x = drag.origX + dx;
  node.y = drag.origY + dy;
  if (!rafPending) {
    rafPending = true;
    requestAnimationFrame(() => { renderMap(); rafPending = false; });
  }
});

document.addEventListener('touchmove', e => {
  if (!drag) return;
  e.preventDefault();
  const pt   = getSVGCoords(e);
  const node = state.nodes[drag.sectionKey][drag.index];
  node.x = drag.origX + (pt.x - drag.startX);
  node.y = drag.origY + (pt.y - drag.startY);
  drag.moved = true;
  if (!rafPending) {
    rafPending = true;
    requestAnimationFrame(() => { renderMap(); rafPending = false; });
  }
}, { passive: false });

document.addEventListener('mouseup',  () => { if (drag) { if (drag.moved) saveState(); drag = null; } });
document.addEventListener('touchend', () => { if (drag) { if (drag.moved) saveState(); drag = null; } });

function handleConnectClick(section, index) {
  const cf = state.connectingFrom;
  if (!cf) {
    // First click — select this node as source
    state.connectingFrom = { section, index };
    updateHint('Now click or Tab to another node and press Enter to link. Press Escape to cancel.');
    renderMap();
    return;
  }
  if (cf.section === section && cf.index === index) {
    // Same node — cancel
    state.connectingFrom = null;
    updateHint('Click or Tab to a node, then press Enter to link.');
    renderMap();
    return;
  }
  // Second click — check if already connected (toggle off) or open label modal
  const exists = state.connections.findIndex(c =>
    (c.fromSection === cf.section && c.fromIndex === cf.index && c.toSection === section && c.toIndex === index) ||
    (c.fromSection === section    && c.fromIndex === index    && c.toSection === cf.section && c.toIndex === cf.index)
  );
  if (exists >= 0) {
    state.connections.splice(exists, 1);
    state.connectingFrom = null;
    updateHint('Click or Tab to a node, then press Enter to link.');
    saveState(); renderMap();
    return;
  }
  // New connection — open label modal
  state.pendingConnection = { fromSection: cf.section, fromIndex: cf.index, toSection: section, toIndex: index };
  state.connectingFrom = null;
  openLabelModal();
}

/* ─────────────────────────────────────────────────
   Connection label modal
───────────────────────────────────────────────── */
function openLabelModal() {
  document.getElementById('input-label').value = '';
  document.getElementById('label-modal').classList.add('open');
  requestAnimationFrame(() => document.getElementById('input-label').focus());
}

function saveLabelModal(label) {
  if (!state.pendingConnection) return;
  state.connections.push({ ...state.pendingConnection, label: label.trim() });
  state.pendingConnection = null;
  document.getElementById('label-modal').classList.remove('open');
  updateHint('Click any connection to start linking.');
  saveState(); renderMap();
}

document.getElementById('label-save').addEventListener('click', () => {
  saveLabelModal(document.getElementById('input-label').value);
});
document.getElementById('label-skip').addEventListener('click', () => {
  saveLabelModal('');
});
document.getElementById('label-modal').addEventListener('keydown', e => {
  if (e.key === 'Escape') { state.pendingConnection = null; document.getElementById('label-modal').classList.remove('open'); renderMap(); }
  if (e.key === 'Enter')  document.getElementById('label-save').click();
});
trapFocus(document.getElementById('label-modal'));


function updateHint(msg) {
  const el = document.getElementById('full-network-hint');
  if (el) el.textContent = state.viewMode === 'full' ? msg : '';
}

// Global Escape — cancel any active connecting state
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state.connectingFrom) {
    state.connectingFrom = null;
    updateHint('Click or Tab to a node, then press Enter to link.');
    renderMap();
    announce('Linking cancelled.');
  }
});


function removeNode(section, index) {
  const name = state.nodes[section][index].name;
  state.nodes[section].splice(index, 1);
  // Remove any connections involving this node (and shift indices)
  state.connections = state.connections.filter(c => {
    if (c.fromSection === section && c.fromIndex === index) return false;
    if (c.toSection   === section && c.toIndex   === index) return false;
    return true;
  }).map(c => ({
    ...c,
    fromIndex: c.fromSection === section && c.fromIndex > index ? c.fromIndex - 1 : c.fromIndex,
    toIndex:   c.toSection   === section && c.toIndex   > index ? c.toIndex   - 1 : c.toIndex
  }));
  if (state.connectingFrom?.section === section && state.connectingFrom?.index === index) {
    state.connectingFrom = null;
  }
  renderMap();
  saveState();
  announce(`${name} removed from map.`);
  document.querySelector(`[data-section="${section}"]`).focus();
}


/* ─────────────────────────────────────────────────
   Center node
───────────────────────────────────────────────── */
function updateCenterLabel() {
  const el = document.getElementById('center-line1');
  el.textContent = truncate(state.centerName, 12);
}

document.getElementById('center-node').addEventListener('click', openNameModal);
document.getElementById('center-node').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openNameModal(); }
});

function openNameModal() {
  const modal = document.getElementById('name-modal');
  const input = document.getElementById('input-center');
  input.value = state.centerName === 'You' ? '' : state.centerName;
  modal.classList.add('open');
  requestAnimationFrame(() => input.focus());
}

document.getElementById('name-cancel').addEventListener('click', () => {
  document.getElementById('name-modal').classList.remove('open');
  document.getElementById('center-node').focus();
});

document.getElementById('name-save').addEventListener('click', saveCenterName);

function saveCenterName() {
  const val = document.getElementById('input-center').value.trim();
  state.centerName = val || 'You';
  updateCenterLabel();
  saveState();
  document.getElementById('name-modal').classList.remove('open');
  document.getElementById('center-node').focus();
  announce(`Center name updated to ${state.centerName}.`);
}

document.getElementById('name-modal').addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('name-modal').classList.remove('open');
    document.getElementById('center-node').focus();
  }
  if (e.key === 'Enter') saveCenterName();
});
trapFocus(document.getElementById('name-modal'));


/* ─────────────────────────────────────────────────
   Add connection modal
───────────────────────────────────────────────── */
document.querySelectorAll('.add-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.lastFocusedBtn = btn;
    openAddModal(btn.dataset.section);
  });
});

function openAddModal(section) {
  state.pendingSection = section;
  const sec  = SECTIONS[section];
  const modal = document.getElementById('add-modal');
  const dl    = document.getElementById('role-datalist');

  document.getElementById('add-modal-title').textContent = `Add ${sec.label} Connection`;
  document.getElementById('input-name').value = '';
  document.getElementById('input-role').value = '';
  document.getElementById('input-name').classList.remove('invalid');
  document.getElementById('name-hint').textContent = '';
  dl.innerHTML = sec.suggestions.map(s => `<option value="${s}">`).join('');

  modal.classList.add('open');
  requestAnimationFrame(() => document.getElementById('input-name').focus());
}

document.getElementById('add-cancel').addEventListener('click', closeAddModal);
document.getElementById('add-confirm').addEventListener('click', confirmAdd);

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
  if (state.lastFocusedBtn) state.lastFocusedBtn.focus();
}

function confirmAdd() {
  const nameInput = document.getElementById('input-name');
  const name = nameInput.value.trim();
  if (!name) {
    nameInput.classList.add('invalid');
    document.getElementById('name-hint').textContent = 'Please enter a name.';
    nameInput.focus();
    return;
  }
  nameInput.classList.remove('invalid');
  const role = document.getElementById('input-role').value.trim();
  state.nodes[state.pendingSection].push({ name, role });
  renderMap();
  saveState();
  announce(`${name} added to ${SECTIONS[state.pendingSection].label} section.`);
  closeAddModal();
}

document.getElementById('add-modal').addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAddModal();
  if (e.key === 'Enter' && document.activeElement.id !== 'add-cancel') confirmAdd();
});
trapFocus(document.getElementById('add-modal'));


/* ─────────────────────────────────────────────────
   Focus trap helper
───────────────────────────────────────────────── */
function trapFocus(dialog) {
  dialog.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    const focusable = Array.from(
      dialog.querySelectorAll('input, button, [tabindex]:not([tabindex="-1"])')
    ).filter(el => !el.disabled);
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault(); last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault(); first.focus();
    }
  });
}


/* ─────────────────────────────────────────────────
   PNG Export
───────────────────────────────────────────────── */
document.getElementById('export-btn').addEventListener('click', exportPNG);

function exportPNG() {
  const svg = document.getElementById('map-svg');

  // Temporarily hide the "tap to edit" hint for export
  const hint = svg.querySelector('#center-node text:last-child');
  const hintOpacity = hint ? hint.getAttribute('opacity') || '1' : null;
  if (hint) hint.setAttribute('opacity', '0');

  const svgStr = new XMLSerializer().serializeToString(svg);
  if (hint && hintOpacity) hint.setAttribute('opacity', hintOpacity);
  else if (hint) hint.removeAttribute('opacity');

  const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const img  = new Image();

  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width  = 800;
    canvas.height = 800;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#F7F7F7';
    ctx.fillRect(0, 0, 800, 800);
    ctx.drawImage(img, 0, 0, 800, 800);
    URL.revokeObjectURL(url);

    const a = document.createElement('a');
    a.download = 'social-connection-map.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}


/* ─────────────────────────────────────────────────
   Persistence (localStorage)
───────────────────────────────────────────────── */
const STORAGE_KEY = 'lazuli-connection-map-v1';

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      centerName:  state.centerName,
      nodes:       state.nodes,
      connections: state.connections
    }));
  } catch(e) { /* storage unavailable — fail silently */ }
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const parsed = JSON.parse(saved);
    if (parsed.nodes)       state.nodes       = parsed.nodes;
    if (parsed.centerName)  state.centerName  = parsed.centerName;
    if (parsed.connections) state.connections = parsed.connections;
  } catch(e) { /* corrupt data — start fresh */ }
}


/* ─────────────────────────────────────────────────
   Init
───────────────────────────────────────────────── */
loadState();
updateCenterLabel();
renderMap();
</script>
