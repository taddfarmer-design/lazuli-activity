<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Connection Map</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #035271;
      --blue:   #1280b0;
      --sky:    #B1D6E3;
      --moon:   #E4F3F9;
      --dgray:  #545454;
      --mgray:  #D9D9D9;
      --lgray:  #F7F7F7;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--moon);
      color: var(--dgray);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      background: var(--navy);
      color: #fff;
      width: 100%;
      padding: 0.875rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.01em; }

    #export-btn {
      padding: 0.45rem 1rem;
      background: transparent;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }
    #export-btn:hover  { background: rgba(255,255,255,0.15); border-color: #fff; }
    #export-btn:focus-visible { outline: 3px solid var(--sky); outline-offset: 2px; }

    /* ── Add-connection toolbar ───────────────────── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.625rem;
      justify-content: center;
      padding: 0.875rem 1rem 0.5rem;
      width: 100%;
      max-width: 860px;
    }

    .add-btn {
      padding: 0.45rem 1rem;
      border: 2px solid currentColor;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      background: #fff;
      letter-spacing: 0.01em;
      transition: background 0.15s, color 0.15s;
    }
    .add-btn:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }
    .add-btn[data-section="personal"]  { color: var(--navy); }
    .add-btn[data-section="work"]      { color: var(--blue); }
    .add-btn[data-section="learning"]  { color: #0a6e8a; }
    .add-btn[data-section="personal"]:hover  { background: var(--navy); color: #fff; }
    .add-btn[data-section="work"]:hover      { background: var(--blue); color: #fff; }
    .add-btn[data-section="learning"]:hover  { background: #0a6e8a; color: #fff; }

    /* ── Map container ────────────────────────────── */
    .map-wrap {
      width: 100%;
      max-width: 800px;
      padding: 0 0.5rem 1.5rem;
    }
    #map-svg { width: 100%; height: auto; display: block; }

    /* ── Legend ───────────────────────────────────── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      justify-content: center;
      padding: 0 1rem 1.25rem;
      font-size: 0.78rem;
      color: var(--dgray);
    }
    .legend-item { display: flex; align-items: center; gap: 0.375rem; }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Modal overlay ────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(3, 82, 113, 0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 1.75rem 1.75rem 1.5rem;
      width: 92%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(3,82,113,0.22);
    }
    .modal h2 {
      font-size: 1.05rem;
      color: var(--navy);
      margin-bottom: 1.25rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--dgray);
      margin-bottom: 0.35rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border: 2px solid var(--mgray);
      border-radius: 7px;
      font-size: 0.95rem;
      color: var(--dgray);
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-group input:focus { outline: none; border-color: var(--blue); }
    .form-group input.invalid { border-color: #c0392b; }

    .field-hint {
      font-size: 0.72rem;
      color: #999;
      margin-top: 0.25rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }
    .btn-secondary {
      padding: 0.45rem 1rem;
      border: 2px solid var(--mgray);
      border-radius: 7px;
      background: #fff;
      color: var(--dgray);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-secondary:hover { border-color: #aaa; }
    .btn-secondary:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }

    .btn-primary {
      padding: 0.45rem 1.1rem;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--navy); }
    .btn-primary:focus-visible { outline: 3px solid var(--navy); outline-offset: 2px; }

    /* ── Screen-reader only ──────────────────────── */
    .sr-only {
      position: absolute; width:1px; height:1px;
      overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap;
    }

    /* ── SVG node hover ───────────────────────────── */
    .conn-node { cursor: default; }
    .conn-node:focus { outline: none; }
    .conn-node:focus .node-circle,
    .conn-node:hover .node-circle {
      filter: drop-shadow(0 0 6px rgba(18,128,176,0.55));
    }
    /* Delete button on nodes */
    .node-delete { cursor: pointer; opacity: 0; transition: opacity 0.15s; }
    .conn-node:hover .node-delete,
    .conn-node:focus .node-delete { opacity: 1; }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────── -->
<header>
  <h1>Social Connection Map</h1>
  <button id="export-btn" aria-label="Download map as PNG image">&#8595; Download PNG</button>
</header>

<!-- ── LIVE REGION ─────────────────────────────────── -->
<div aria-live="polite" aria-atomic="true" class="sr-only" id="live-announce"></div>

<!-- ── ADD BUTTONS ─────────────────────────────────── -->
<div class="toolbar" role="toolbar" aria-label="Add connections to your map">
  <button class="add-btn" data-section="personal"  aria-label="Add a personal connection">+ Personal</button>
  <button class="add-btn" data-section="work"       aria-label="Add a work or community connection">+ Work / Community</button>
  <button class="add-btn" data-section="learning"   aria-label="Add a learning connection">+ Learning</button>
</div>

<!-- ── MAP ─────────────────────────────────────────── -->
<main class="map-wrap">
  <svg id="map-svg" viewBox="0 0 800 800"
       xmlns="http://www.w3.org/2000/svg"
       role="img"
       aria-labelledby="map-title map-desc">
    <title id="map-title">Social Connection Map</title>
    <desc  id="map-desc">An interactive mind-map showing personal, work/community, and learning connections radiating from a central node.</desc>

    <!-- Background -->
    <rect width="800" height="800" fill="#F7F7F7"/>

    <!-- Section fills -->
    <path id="fill-personal"  fill="#E4F3F9" opacity="0.85"/>
    <path id="fill-work"      fill="#B1D6E3" opacity="0.6"/>
    <path id="fill-learning"  fill="#cce5f0" opacity="0.6"/>

    <!-- Divider lines -->
    <line id="div-0" stroke="#C8DDE8" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line id="div-1" stroke="#C8DDE8" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line id="div-2" stroke="#C8DDE8" stroke-width="1.5" stroke-dasharray="6 4"/>

    <!-- Section labels -->
    <text id="lbl-personal" text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
          font-size="16" font-weight="700" fill="#035271" opacity="0.55" pointer-events="none"/>
    <text id="lbl-work"     text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
          font-size="16" font-weight="700" fill="#1280b0" opacity="0.65" pointer-events="none"/>
    <text id="lbl-learning" text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
          font-size="16" font-weight="700" fill="#0a6e8a" opacity="0.65" pointer-events="none"/>

    <!-- Connections (lines) -->
    <g id="g-lines"></g>

    <!-- Nodes -->
    <g id="g-nodes"></g>

    <!-- Center node (rendered last so it's on top) -->
    <g id="center-node" role="button" tabindex="0"
       aria-label="Center node — your name. Press Enter to edit.">
      <circle id="center-circle" cx="400" cy="400" r="52"
              fill="#035271" stroke="#fff" stroke-width="4"
              style="cursor:pointer; filter:drop-shadow(0 3px 8px rgba(3,82,113,0.35))"/>
      <text id="center-line1" x="400" y="397"
            text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
            font-size="14" font-weight="700" fill="#fff" pointer-events="none">You</text>
      <text x="400" y="413"
            text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
            font-size="9" fill="rgba(255,255,255,0.65)" pointer-events="none">tap to edit</text>
    </g>
  </svg>
</main>

<!-- ── LEGEND ──────────────────────────────────────── -->
<div class="legend" aria-label="Map legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#035271"></div>
    <span>Personal</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#1280b0"></div>
    <span>Work / Community</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#0a6e8a"></div>
    <span>Learning</span>
  </div>
  <div class="legend-item" style="color:#999">
    <span>Hover a node to reveal the &times; button &nbsp;·&nbsp; Tab to navigate &nbsp;·&nbsp; Delete key to remove</span>
  </div>
</div>

<!-- ── ADD CONNECTION MODAL ────────────────────────── -->
<div class="overlay" id="add-modal" role="dialog" aria-modal="true" aria-labelledby="add-modal-title">
  <div class="modal">
    <h2 id="add-modal-title">Add Connection</h2>
    <div class="form-group">
      <label for="input-name">Name <span aria-hidden="true">*</span></label>
      <input type="text" id="input-name" autocomplete="off" placeholder="e.g. Alex" required />
      <p class="field-hint" id="name-hint" aria-live="polite"></p>
    </div>
    <div class="form-group">
      <label for="input-role">Relationship type <span style="font-weight:400;color:#999">(optional)</span></label>
      <input type="text" id="input-role" autocomplete="off"
             placeholder="e.g. Friend, Mentor, Colleague…"
             list="role-datalist" />
      <datalist id="role-datalist"></datalist>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="add-cancel">Cancel</button>
      <button class="btn-primary"   id="add-confirm">Add to Map</button>
    </div>
  </div>
</div>

<!-- ── EDIT NAME MODAL ─────────────────────────────── -->
<div class="overlay" id="name-modal" role="dialog" aria-modal="true" aria-labelledby="name-modal-title">
  <div class="modal">
    <h2 id="name-modal-title">Your Name</h2>
    <div class="form-group">
      <label for="input-center">Your name (shown in center)</label>
      <input type="text" id="input-center" autocomplete="off" placeholder="Your name" />
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="name-cancel">Cancel</button>
      <button class="btn-primary"   id="name-save">Save</button>
    </div>
  </div>
</div>


<script>
/* ─────────────────────────────────────────────────
   Constants & config
───────────────────────────────────────────────── */
const CX = 400, CY = 400;
const R_CENTER  = 52;
const R_INNER   = R_CENTER + 10;   // gap between center and sector fills
const R_OUTER   = 368;
const TO_RAD    = Math.PI / 180;

const SECTIONS = {
  personal: {
    start: -90, end: 30,
    nodeColor: '#035271',
    fillId:    'fill-personal',
    labelId:   'lbl-personal',
    label:     'Personal',
    suggestions: ['Friend','Family','Partner','Neighbor','Mentor','Peer','Sibling','Parent']
  },
  work: {
    start: 30, end: 150,
    nodeColor: '#1280b0',
    fillId:    'fill-work',
    labelId:   'lbl-work',
    label:     'Work / Community',
    suggestions: ['Colleague','Manager','Client','Volunteer','Community Member','Teammate','Sponsor','Neighbor']
  },
  learning: {
    start: 150, end: 270,
    nodeColor: '#0a6e8a',
    fillId:    'fill-learning',
    labelId:   'lbl-learning',
    label:     'Learning',
    suggestions: ['Instructor','Study Partner','Tutor','Classmate','Coach','Advisor','Peer Mentor','Lab Partner']
  }
};

const state = {
  nodes: { personal: [], work: [], learning: [] },
  centerName: 'You',
  pendingSection: null,
  lastFocusedBtn: null
};


/* ─────────────────────────────────────────────────
   Utility helpers
───────────────────────────────────────────────── */
function polar(angleDeg, r) {
  const a = angleDeg * TO_RAD;
  return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) };
}

function sectorPath(startDeg, endDeg, outerR, innerR) {
  const p1 = polar(startDeg, outerR);
  const p2 = polar(endDeg,   outerR);
  const p3 = polar(endDeg,   innerR);
  const p4 = polar(startDeg, innerR);
  const large = (endDeg - startDeg) > 180 ? 1 : 0;
  return [
    `M ${p4.x} ${p4.y}`,
    `L ${p1.x} ${p1.y}`,
    `A ${outerR} ${outerR} 0 ${large} 1 ${p2.x} ${p2.y}`,
    `L ${p3.x} ${p3.y}`,
    `A ${innerR} ${innerR} 0 ${large} 0 ${p4.x} ${p4.y}`,
    'Z'
  ].join(' ');
}

function truncate(str, max) {
  return str.length > max ? str.slice(0, max - 1) + '\u2026' : str;
}

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

function announce(msg) {
  const el = document.getElementById('live-announce');
  el.textContent = '';
  requestAnimationFrame(() => { el.textContent = msg; });
}


/* ─────────────────────────────────────────────────
   Layout: position nodes in a sector
───────────────────────────────────────────────── */
function nodePosition(sectionKey, index) {
  const sec   = SECTIONS[sectionKey];
  const total = state.nodes[sectionKey].length;
  const arcSpread = (sec.end - sec.start) * 0.72;
  const midAngle  = (sec.start + sec.end) / 2;

  const COLS    = 3;
  const row     = Math.floor(index / COLS);
  const col     = index % COLS;
  const rowSize = Math.min(COLS, total - row * COLS);

  const step      = rowSize > 1 ? arcSpread / (rowSize - 1) : 0;
  const rowStart  = midAngle - (arcSpread / 2);
  const angle     = rowSize > 1 ? rowStart + col * step : midAngle;

  const radii = [155, 240, 320];
  const radius = radii[Math.min(row, radii.length - 1)];
  return polar(angle, radius);
}


/* ─────────────────────────────────────────────────
   Render
───────────────────────────────────────────────── */
function renderMap() {
  // Sectors & dividers
  const divAngles = [-90, 30, 150];
  Object.entries(SECTIONS).forEach(([key, sec], i) => {
    document.getElementById(sec.fillId).setAttribute('d',
      sectorPath(sec.start, sec.end, R_OUTER, R_INNER));

    // Divider at section START angle
    const dv = document.getElementById(`div-${i}`);
    const inner = polar(sec.start, R_INNER);
    const outer = polar(sec.start, R_OUTER);
    dv.setAttribute('x1', inner.x); dv.setAttribute('y1', inner.y);
    dv.setAttribute('x2', outer.x); dv.setAttribute('y2', outer.y);

    // Section label at mid-arc, 78% radius
    const mid = polar((sec.start + sec.end) / 2, R_OUTER * 0.78);
    const lbl = document.getElementById(sec.labelId);
    lbl.setAttribute('x', mid.x);
    lbl.setAttribute('y', mid.y);
    lbl.textContent = sec.label;
  });

  // Connection lines
  const gLines = document.getElementById('g-lines');
  gLines.innerHTML = '';
  Object.entries(state.nodes).forEach(([key, list]) => {
    const color = SECTIONS[key].nodeColor;
    list.forEach((node, i) => {
      const pos = nodePosition(key, i);
      const line = svgEl('line', {
        x1: CX, y1: CY, x2: pos.x, y2: pos.y,
        stroke: color, 'stroke-width': '2',
        'stroke-opacity': '0.45'
      });
      gLines.appendChild(line);
    });
  });

  // Nodes
  const gNodes = document.getElementById('g-nodes');
  gNodes.innerHTML = '';
  Object.entries(state.nodes).forEach(([key, list]) => {
    const color = SECTIONS[key].nodeColor;
    list.forEach((node, i) => {
      const { x, y } = nodePosition(key, i);
      const label = node.role
        ? `${node.name}, ${node.role}, ${SECTIONS[key].label} connection`
        : `${node.name}, ${SECTIONS[key].label} connection`;

      const g = svgEl('g', {
        role: 'button',
        tabindex: '0',
        class: 'conn-node',
        'aria-label': `${label}. Press Delete or Backspace to remove.`,
        'data-section': key,
        'data-index': String(i)
      });

      const circle = svgEl('circle', {
        cx: x, cy: y, r: '38',
        fill: '#fff',
        stroke: color, 'stroke-width': '2.5',
        class: 'node-circle',
        style: 'filter:drop-shadow(0 2px 5px rgba(0,0,0,0.12))'
      });
      g.appendChild(circle);

      const nameY = node.role ? y - 5 : y + 5;
      const tName = svgEl('text', {
        x, y: nameY,
        'text-anchor': 'middle',
        'font-family': 'Arial,Helvetica,sans-serif',
        'font-size': '13', 'font-weight': '700',
        fill: '#035271',
        'pointer-events': 'none'
      });
      tName.textContent = truncate(node.name, 10);
      g.appendChild(tName);

      if (node.role) {
        const tRole = svgEl('text', {
          x, y: y + 12,
          'text-anchor': 'middle',
          'font-family': 'Arial,Helvetica,sans-serif',
          'font-size': '10', 'font-weight': '400',
          fill: color,
          'pointer-events': 'none'
        });
        tRole.textContent = truncate(node.role, 13);
        g.appendChild(tRole);
      }

      // × delete button (top-right of node)
      const delR = 12;
      const delX = x + 26, delY = y - 26;
      const delG = svgEl('g', { class: 'node-delete', 'aria-hidden': 'true' });

      const delCircle = svgEl('circle', {
        cx: delX, cy: delY, r: delR,
        fill: '#c0392b', stroke: '#fff', 'stroke-width': '2'
      });
      delG.appendChild(delCircle);

      const delLine1 = svgEl('line', {
        x1: delX - 5, y1: delY - 5, x2: delX + 5, y2: delY + 5,
        stroke: '#fff', 'stroke-width': '2', 'stroke-linecap': 'round'
      });
      const delLine2 = svgEl('line', {
        x1: delX + 5, y1: delY - 5, x2: delX - 5, y2: delY + 5,
        stroke: '#fff', 'stroke-width': '2', 'stroke-linecap': 'round'
      });
      delG.appendChild(delLine1);
      delG.appendChild(delLine2);

      delG.addEventListener('click', e => {
        e.stopPropagation();
        removeNode(key, i);
      });
      g.appendChild(delG);

      // Keyboard: Delete / Backspace removes the node
      g.addEventListener('keydown', e => {
        if (e.key === 'Delete' || e.key === 'Backspace') {
          e.preventDefault();
          removeNode(key, i);
        }
      });

      gNodes.appendChild(g);
    });
  });
}

function removeNode(section, index) {
  const name = state.nodes[section][index].name;
  state.nodes[section].splice(index, 1);
  renderMap();
  announce(`${name} removed from map.`);
  document.querySelector(`[data-section="${section}"]`).focus();
}


/* ─────────────────────────────────────────────────
   Center node
───────────────────────────────────────────────── */
function updateCenterLabel() {
  const el = document.getElementById('center-line1');
  el.textContent = truncate(state.centerName, 12);
}

document.getElementById('center-node').addEventListener('click', openNameModal);
document.getElementById('center-node').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openNameModal(); }
});

function openNameModal() {
  const modal = document.getElementById('name-modal');
  const input = document.getElementById('input-center');
  input.value = state.centerName === 'You' ? '' : state.centerName;
  modal.classList.add('open');
  requestAnimationFrame(() => input.focus());
}

document.getElementById('name-cancel').addEventListener('click', () => {
  document.getElementById('name-modal').classList.remove('open');
  document.getElementById('center-node').focus();
});

document.getElementById('name-save').addEventListener('click', saveCenterName);

function saveCenterName() {
  const val = document.getElementById('input-center').value.trim();
  state.centerName = val || 'You';
  updateCenterLabel();
  document.getElementById('name-modal').classList.remove('open');
  document.getElementById('center-node').focus();
  announce(`Center name updated to ${state.centerName}.`);
}

document.getElementById('name-modal').addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('name-modal').classList.remove('open');
    document.getElementById('center-node').focus();
  }
  if (e.key === 'Enter') saveCenterName();
});
trapFocus(document.getElementById('name-modal'));


/* ─────────────────────────────────────────────────
   Add connection modal
───────────────────────────────────────────────── */
document.querySelectorAll('.add-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.lastFocusedBtn = btn;
    openAddModal(btn.dataset.section);
  });
});

function openAddModal(section) {
  state.pendingSection = section;
  const sec  = SECTIONS[section];
  const modal = document.getElementById('add-modal');
  const dl    = document.getElementById('role-datalist');

  document.getElementById('add-modal-title').textContent = `Add ${sec.label} Connection`;
  document.getElementById('input-name').value = '';
  document.getElementById('input-role').value = '';
  document.getElementById('input-name').classList.remove('invalid');
  document.getElementById('name-hint').textContent = '';
  dl.innerHTML = sec.suggestions.map(s => `<option value="${s}">`).join('');

  modal.classList.add('open');
  requestAnimationFrame(() => document.getElementById('input-name').focus());
}

document.getElementById('add-cancel').addEventListener('click', closeAddModal);
document.getElementById('add-confirm').addEventListener('click', confirmAdd);

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
  if (state.lastFocusedBtn) state.lastFocusedBtn.focus();
}

function confirmAdd() {
  const nameInput = document.getElementById('input-name');
  const name = nameInput.value.trim();
  if (!name) {
    nameInput.classList.add('invalid');
    document.getElementById('name-hint').textContent = 'Please enter a name.';
    nameInput.focus();
    return;
  }
  nameInput.classList.remove('invalid');
  const role = document.getElementById('input-role').value.trim();
  state.nodes[state.pendingSection].push({ name, role });
  renderMap();
  announce(`${name} added to ${SECTIONS[state.pendingSection].label} section.`);
  closeAddModal();
}

document.getElementById('add-modal').addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAddModal();
  if (e.key === 'Enter' && document.activeElement.id !== 'add-cancel') confirmAdd();
});
trapFocus(document.getElementById('add-modal'));


/* ─────────────────────────────────────────────────
   Focus trap helper
───────────────────────────────────────────────── */
function trapFocus(dialog) {
  dialog.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    const focusable = Array.from(
      dialog.querySelectorAll('input, button, [tabindex]:not([tabindex="-1"])')
    ).filter(el => !el.disabled);
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault(); last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault(); first.focus();
    }
  });
}


/* ─────────────────────────────────────────────────
   PNG Export
───────────────────────────────────────────────── */
document.getElementById('export-btn').addEventListener('click', exportPNG);

function exportPNG() {
  const svg = document.getElementById('map-svg');

  // Temporarily hide the "tap to edit" hint for export
  const hint = svg.querySelector('#center-node text:last-child');
  const hintOpacity = hint ? hint.getAttribute('opacity') || '1' : null;
  if (hint) hint.setAttribute('opacity', '0');

  const svgStr = new XMLSerializer().serializeToString(svg);
  if (hint && hintOpacity) hint.setAttribute('opacity', hintOpacity);
  else if (hint) hint.removeAttribute('opacity');

  const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const img  = new Image();

  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width  = 800;
    canvas.height = 800;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#F7F7F7';
    ctx.fillRect(0, 0, 800, 800);
    ctx.drawImage(img, 0, 0, 800, 800);
    URL.revokeObjectURL(url);

    const a = document.createElement('a');
    a.download = 'social-connection-map.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}


/* ─────────────────────────────────────────────────
   Init
───────────────────────────────────────────────── */
renderMap();
</script>
